name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Build (unsigned)
        run: |
          xcodebuild -project Scramble.xcodeproj -scheme Scramble \
            -configuration Release -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_ALLOWED=NO build
      - name: Package
        run: ditto -c -k --keepParent build/Build/Products/Release/Scramble.app Scramble-macOS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Scramble-macOS
          path: Scramble-macOS.zip

  build-ios:
    name: iOS app (simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Build (unsigned, simulator)
        run: |
          xcodebuild -project Scramble.xcodeproj -scheme Scramble \
            -configuration Release -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO build

